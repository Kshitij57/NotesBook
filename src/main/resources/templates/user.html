<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1em;
        }

        main {
            padding: 20px;
        }

        .user-profile {
            max-width: 400px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .user-details {
            margin-top: 20px;
        }

        .user-details label {
            font-weight: bold;
            display: inline-block;
            width: 100px;
        }

        .user-details p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<header>
    <h1>User Profile</h1>
</header>

<main>
    <div class="user-profile">
        <div class="user-details">
            <label>First Name:</label>
            <p>John</p>
            <label>Last Name:</label>
            <p>Doe</p>
            <label>Email:</label>
            <p>john.doe@example.com</p>
            <label>Username:</label>
            <p>john_doe123</p>
            <!-- Add more user details as needed -->
        </div>
    </div>
</main>

</body>
</html>
