<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1em;
        }

        main {
            padding: 20px;
        }

        .note-details {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .note-details h2 {
            color: #333;
        }

        .note-content {
            margin-top: 20px;
        }

        .note-content label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .note-content p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<header>
    <h1>Note Details</h1>
</header>

<main>
    <div class="note-details">
        <h2>Note Title: My First Note</h2>
        <div class="note-content">
            <label>Content:</label>
            <p>This is the content of my first note. It can include multiple lines and details about the note.</p>
            <label>Author:</label>
            <p>John Doe</p>
            <label>Created Date:</label>
            <p>January 1, 2022</p>
            <!-- Add more note details as needed -->
        </div>
    </div>
</main>

</body>
</html>
